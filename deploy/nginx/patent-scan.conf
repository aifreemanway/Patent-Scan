# Patent-Scan — Nginx reverse proxy for the Next.js app (pm2 on 127.0.0.1:3000).
# Place at /etc/nginx/sites-available/patent-scan.conf, symlink into sites-enabled,
# then `certbot --nginx -d patent-scan.ru -d www.patent-scan.ru` (it injects the
# ssl_certificate lines + the 80→443 redirect automatically).
#
# CRITICAL: the proxy timeouts must exceed the app's longest route — Deep
# Analysis runs up to 300s (DEEP_ANALYSIS_TIMEOUT_MS). With Nginx's default 60s
# the request would 504 mid-analysis. This is the whole reason we self-host
# instead of Vercel's serverless cap.
# Bumped from 130s → 310s on 2026-05-29 after live failures where Sonnet via
# the Timeweb gateway repeatedly exceeded the old 120s app cap on ~60-patent
# prompts. App timeout MUST stay below this so the AbortController fires first
# (gives us a refund + clean 504, not a half-killed connection).

server {
    listen 80;
    listen [::]:80;
    server_name patent-scan.ru www.patent-scan.ru;
    location / { return 301 https://$host$request_uri; }
}

server {
    # nginx 1.18 (Ubuntu 22.04) needs http2 on the listen line — `http2 on;` is 1.25.1+.
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name patent-scan.ru www.patent-scan.ru;

    # ssl_certificate / ssl_certificate_key — managed by Certbot (certbot --nginx).

    client_max_body_size 2m;          # descriptions are text; cap upload size
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long-running LLM/PatSearch routes — must be > 300s Deep Analysis budget.
        proxy_connect_timeout 10s;
        proxy_send_timeout    310s;
        proxy_read_timeout    310s;
        proxy_buffering       off;     # stream responses; don't buffer slow upstreams
    }
}
